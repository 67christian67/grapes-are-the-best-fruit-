<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍇 GRAPES SUPREME • THE ULTIMATE STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

        :root {
            --grape-primary: #a855f7;
            --grape-dark: #03000a;
            --gold: #ffd700;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--grape-dark);
            color: white;
            overflow-x: hidden;
            scroll-behavior: smooth;
            cursor: none;
        }

        .hero-font { font-family: 'Playfair Display', serif; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }

        /* Text Effects */
        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }
        .outline-text:hover {
            color: white;
            -webkit-text-stroke: 1px transparent;
            filter: drop-shadow(0 0 20px var(--grape-primary));
        }

        /* V-TUBER RIG STYLES */
        .headset-band { position: absolute; top: -10px; width: 110%; height: 60%; border: 8px solid #222; border-radius: 50% 50% 0 0; border-bottom: none; }
        .earcup { position: absolute; width: 25px; height: 45px; background: #1a1a1a; border-radius: 10px; border: 2px solid var(--grape-primary); }
        .mic-arm { position: absolute; bottom: 15px; left: -25px; width: 45px; height: 10px; background: #333; border-radius: 20px; transform: rotate(15deg); }
        .mic-pop { position: absolute; right: -5px; top: -5px; width: 22px; height: 22px; background: #000; border: 1px solid #444; border-radius: 50%; }

        /* Animations */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 0.8s ease-out; }
        .revealed { opacity: 1; transform: translateY(0); }

        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        #custom-cursor {
            width: 40px; height: 40px;
            position: fixed; pointer-events: none; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .gold-glow { filter: drop-shadow(0 0 15px var(--gold)) saturate(2); }
    </style>
</head>
<body>

    <div id="custom-cursor"><span class="text-3xl">🍇</span></div>

    <div class="fixed top-0 left-0 w-full z-[110] bg-zinc-900/95 backdrop-blur-lg border-b-2 border-purple-600 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-6">
            <div class="flex-shrink-0 flex items-center gap-2">
                <span class="animate-bounce">🍇</span>
                <span class="text-xs font-black italic text-purple-400 uppercase">Grape Goal:</span>
            </div>
            <div class="flex-1 h-5 bg-black rounded-full overflow-hidden border border-white/10 relative">
                <div id="goal-bar" class="h-full bg-gradient-to-r from-purple-600 to-fuchsia-500 transition-all duration-700" style="width: 15%"></div>
                <div class="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-white uppercase mix-blend-difference tracking-widest">
                    Spam clicks to reach 100%
                </div>
            </div>
            <div class="flex-shrink-0 text-white font-mono text-sm font-black" id="goal-percent">15%</div>
        </div>
    </div>

    <div id="twitch-chat" class="fixed top-24 right-6 z-[90] w-64 h-[45vh] glass rounded-2xl flex flex-col shadow-2xl hidden md:flex">
        <div class="p-3 border-b border-white/10 flex justify-between items-center bg-purple-900/10">
            <span class="text-[10px] font-bold uppercase tracking-widest text-purple-400">Stream Chat</span>
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
        <div id="chat-container" class="flex-1 overflow-y-auto p-3 space-y-2 text-[11px] font-medium"></div>
    </div>

    <div id="grape-cam" class="fixed bottom-6 right-6 z-[100] w-72 h-56 bg-zinc-900 border-4 border-purple-600 rounded-xl shadow-2xl overflow-hidden hidden md:block transition-all duration-500">
        <div id="cam-overlay" class="absolute top-0 left-0 w-full bg-purple-600 px-2 py-1 flex justify-between items-center z-20">
            <span class="text-[9px] font-black" id="cam-label">LIVE: GRAPE_SUPREME</span>
            <span class="text-[9px] font-mono">REC ● 14.2k</span>
        </div>
        
        <div class="relative w-full h-full flex items-center justify-center bg-[#111] pt-6">
            <div id="streamer-rig" class="relative transition-transform duration-100 ease-out">
                <div id="headset-band" class="headset-band"></div>
                <div id="ear-l" class="earcup -left-4 top-10"></div>
                <div id="ear-r" class="earcup -right-4 top-10"></div>
                
                <div id="grape-character" class="text-9xl relative z-10 select-none transition-all duration-200">🍇</div>
                
                <div class="mic-arm relative z-20">
                    <div class="mic-pop"></div>
                </div>
            </div>

            <div id="grape-chat" class="absolute top-16 right-4 bg-white text-black text-[10px] font-black px-3 py-2 rounded-lg opacity-0 transition-opacity shadow-xl z-50">
                POG!
            </div>
        </div>
    </div>

    <div id="dono-alert" class="fixed top-40 left-1/2 -translate-x-1/2 z-[200] pointer-events-none opacity-0 scale-50 transition-all duration-500">
        <div class="bg-yellow-400 p-1 rounded-lg shadow-2xl">
            <div class="bg-zinc-900 px-10 py-4 rounded-lg text-center">
                <div class="text-yellow-400 font-black italic text-xl">NEW DONO!</div>
                <div id="dono-user" class="text-white font-bold text-sm">User: $5.00</div>
            </div>
        </div>
    </div>

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-4 pt-20">
        <div class="reveal">
            <span class="px-4 py-1 bg-purple-500/20 text-purple-400 rounded-full text-xs font-bold tracking-widest mb-6 inline-block uppercase">Most Viewed Fruit 2026</span>
            <h1 class="hero-font text-[12vw] font-black leading-none outline-text uppercase">GRAPES</h1>
            <p class="text-xl md:text-3xl text-zinc-400 mt-4 max-w-2xl font-light italic">Nothing comes close to the juice.</p>
            <div class="mt-12 flex gap-4 justify-center">
                <button onclick="scrollToSection('why')" class="px-10 py-5 bg-white text-black font-black rounded-full hover:scale-105 transition-transform active:scale-95">PROVE IT</button>
                <button onclick="scrollToSection('shop')" class="px-10 py-5 glass rounded-full font-black hover:bg-white/10 transition-all">VISIT SHOP</button>
            </div>
        </div>
    </header>

    <section id="shop" class="py-40">
        <div class="max-w-4xl mx-auto px-8">
            <div class="text-center mb-16">
                <h2 class="hero-font text-7xl font-bold mb-4">SKIN SHOP</h2>
                <p class="text-purple-400 font-mono text-sm uppercase">Equip your V-Tuber Outfit</p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <button onclick="changeSkin('🍇', 'Default')" class="glass p-6 rounded-2xl hover:bg-white/10 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">🍇</span>
                    <span class="text-xs font-bold uppercase">Classic</span>
                </button>
                <button onclick="changeSkin('🕶️', 'Cool Grape')" class="glass p-6 rounded-2xl hover:bg-white/10 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">🕶️</span>
                    <span class="text-xs font-bold uppercase">Cool Guy</span>
                </button>
                <button onclick="changeSkin('👑', 'The King')" class="glass p-6 rounded-2xl hover:bg-white/10 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">👑</span>
                    <span class="text-xs font-bold uppercase">Royalty</span>
                </button>
                <button onclick="changeSkin('✨', 'Golden')" class="glass p-6 rounded-2xl border-yellow-500 bg-yellow-500/10 hover:bg-yellow-500/20 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">✨</span>
                    <span class="text-xs font-bold uppercase">Golden</span>
                </button>
                <button onclick="changeSkin('👽', 'Space')" class="glass p-6 rounded-2xl hover:bg-white/10 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">👽</span>
                    <span class="text-xs font-bold uppercase">Alien</span>
                </button>
                <button onclick="changeSkin('🤖', 'Cyber')" class="glass p-6 rounded-2xl hover:bg-white/10 transition-all flex flex-col items-center gap-4">
                    <span class="text-5xl">🤖</span>
                    <span class="text-xs font-bold uppercase">Bot</span>
                </button>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-zinc-600 text-[10px] tracking-[0.5em] uppercase border-t border-white/5">
        Stay Juicy • 2026 Grapes Supreme Inc.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const cursor = document.getElementById('custom-cursor');
        const rig = document.getElementById('streamer-rig');
        const character = document.getElementById('grape-character');
        const chatBubble = document.getElementById('grape-chat');
        const chatContainer = document.getElementById('chat-container');
        const goalBar = document.getElementById('goal-bar');
        const goalPercent = document.getElementById('goal-percent');
        const donoAlert = document.getElementById('dono-alert');

        // --- MOUSE TRACKING ---
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Rig follows mouse
            const x = (e.clientX - window.innerWidth / 2) / 35;
            const y = (e.clientY - window.innerHeight / 2) / 35;
            rig.style.transform = `translate(${x}px, ${y}px) rotate(${x}deg)`;
        });

        // --- CHAT SYSTEM ---
        const users = ['JuiceGod', 'AppleHater', 'VineLord', 'PurpleKing', 'Seedless99', 'GamerGrape'];
        const msgs = ['🍇🍇🍇🍇', 'POGGERS', 'W STRAT', 'LMAO', 'GRAPE GANG', 'SHEESH', 'Based fruit choice'];

        function addChat(u, m, col = 'text-purple-400') {
            const div = document.createElement('div');
            div.innerHTML = `<span class="${col} font-bold">${u}:</span> <span class="text-zinc-300">${m}</span>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if(chatContainer.children.length > 15) chatContainer.removeChild(chatContainer.firstChild);
        }
        setInterval(() => addChat(users[Math.floor(Math.random()*users.length)], msgs[Math.floor(Math.random()*msgs.length)]), 2000);

        // --- REACTIONS ---
        function grapeSpeak(text) {
            chatBubble.innerText = text;
            chatBubble.style.opacity = '1';
            setTimeout(() => chatBubble.style.opacity = '0', 2000);
        }

        // --- SKINS & GOLDEN MODE ---
        function changeSkin(emoji, name) {
            character.innerText = emoji;
            grapeSpeak(`NEW SKIN: ${name}!`);
            
            const cam = document.getElementById('grape-cam');
            const overlay = document.getElementById('cam-overlay');
            const ears = [document.getElementById('ear-l'), document.getElementById('ear-r')];
            const band = document.getElementById('headset-band');

            if(name === 'Golden') {
                character.classList.add('gold-glow');
                cam.style.borderColor = '#ffd700';
                overlay.style.backgroundColor = '#ffd700';
                overlay.style.color = '#000';
                ears.forEach(e => e.style.backgroundColor = '#ffd700');
                band.style.borderColor = '#ffd700';
                addChat('SYSTEM', 'GOLDEN MODE ACTIVATED', 'text-yellow-400');
            } else {
                character.classList.remove('gold-glow');
                cam.style.borderColor = '#a855f7';
                overlay.style.backgroundColor = '#a855f7';
                overlay.style.color = '#fff';
                ears.forEach(e => e.style.backgroundColor = '#1a1a1a');
                band.style.borderColor = '#222';
            }
            
            launchConfetti();
        }

        // --- GOAL SYSTEM ---
        let progress = 15;
        function updateGoal(amt) {
            progress = Math.min(progress + amt, 100);
            goalBar.style.width = progress + '%';
            goalPercent.innerText = Math.floor(progress) + '%';
            if(progress >= 100) grapeSpeak("GOAL ACHIEVED!! 🍇");
        }

        // --- CLICK EVENTS ---
        document.addEventListener('mousedown', () => {
            character.style.transform = 'scale(1.2)';
            updateGoal(0.2);
            if(Math.random() > 0.9) grapeSpeak("HYPE!");
            setTimeout(() => character.style.transform = 'scale(1)', 100);
        });

        // --- UTILS ---
        function launchConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#a855f7', '#ffd700'] });
            
            const user = users[Math.floor(Math.random()*users.length)];
            document.getElementById('dono-user').innerText = `${user}: $${(Math.random()*20 + 1).toFixed(2)}`;
            donoAlert.style.opacity = '1';
            donoAlert.style.transform = 'translate(-50%, 0) scale(1)';
            setTimeout(() => {
                donoAlert.style.opacity = '0';
                donoAlert.style.transform = 'translate(-50%, 0) scale(0.5)';
            }, 3000);
        }

        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        // --- REVEAL ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('revealed'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
