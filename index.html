<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍇 GRAPES SUPREME • Light Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0015;
            color: white;
            overflow-x: hidden;
        }

        .hero-font { font-family: 'Playfair Display', serif; }

        .bg-gradient-animate {
            background: linear-gradient(135deg, #1a0033, #001a33, #00331a);
            background-size: 300% 300%;
            animation: gradient 35s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #custom-cursor {
            position: fixed;
            left: 0; top: 0;
            width: 48px; height: 48px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: all 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            filter: drop-shadow(0 0 12px #b388ff);
        }

        #custom-cursor.hover {
            transform: translate(-50%, -50%) scale(1.4);
            filter: drop-shadow(0 0 25px #d4a5ff);
        }

        #grape-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .glass-nav {
            background: rgba(30, 0, 60, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(139,0,255,0.2);
        }

        .reveal {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1s ease-out;
        }
        .revealed { opacity: 1; transform: translateY(0); }

        .shine-text {
            background: linear-gradient(90deg, #fff, #c084fc, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 6s linear infinite;
        }
        @keyframes shine { 0%{background-position:-200%} 100%{background-position:200%} }
    </style>
</head>
<body class="bg-gradient-animate">

    <canvas id="grape-canvas"></canvas>

    <div id="custom-cursor">🍇</div>

    <!-- Floating Nav (simplified) -->
    <nav class="glass-nav fixed top-4 left-1/2 -translate-x-1/2 z-50 px-8 py-4 rounded-2xl flex items-center gap-8 shadow-xl">
        <span class="hero-font text-2xl font-bold">GRAPES SUPREME</span>
        <button onclick="confettiBurst()" class="px-6 py-2 bg-violet-700 rounded-xl hover:bg-violet-600 transition">
            Grape Power!
        </button>
    </nav>

    <!-- Hero -->
    <header class="min-h-screen flex items-center justify-center text-center px-6 relative z-10">
        <div>
            <h1 class="hero-font text-8xl md:text-[10rem] font-black shine-text leading-none mb-4">GRAPES</h1>
            <p class="text-4xl md:text-5xl text-violet-300 mb-12">are the best fruit.<br>Nothing comes close.</p>
            <p class="text-xl opacity-80">Move your mouse — grapes will gently orbit you</p>
        </div>
    </header>

    <script>
        // Cursor
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top  = e.clientY + 'px';
        });
        document.querySelectorAll('button').forEach(b => {
            b.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            b.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // Canvas – light version
        const canvas = document.getElementById('grape-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

        class LightGrape {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * -0.5 - 50;
                this.size = Math.random() * 18 + 14;
                this.speed = Math.random() * 2 + 0.8;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.04;
                this.opacity = Math.random() * 0.4 + 0.5;
            }
            update() {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 220 && dist > 10) {
                    // gentle orbit pull
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const target = 140;
                    const error = dist - target;
                    this.x -= nx * error * 0.025;
                    this.y -= ny * error * 0.025;

                    // soft spin
                    const tx = -ny;
                    const ty = nx;
                    this.x += tx * 1.8;
                    this.y += ty * 1.8;

                    this.angle += this.spin * 1.5;
                } else {
                    this.y += this.speed;
                    this.angle += this.spin;
                }

                if (this.y > canvas.height + 100) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.font = `${this.size}px serif`;
                ctx.fillText('🍇', -this.size/2, this.size/2);
                ctx.restore();
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // Spawn initial + slow respawn
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 38; i++) {
            particles.push(new LightGrape());
        }
        animate();

        // Very light confetti burst on button
        function confettiBurst() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const p = new LightGrape();
                    p.x = mouse.x;
                    p.y = mouse.y - 80;
                    p.speed = 1.5 + Math.random() * 3;
                    particles.push(p);
                }, i * 30);
            }
        }

        document.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        console.log("Light grape mode loaded – should be smooth on Chromebook 🍇");
    </script>
</body>
</html>
